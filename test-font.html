<!DOCTYPE html>
<html>
<head>
<style>
@font-face {
    font-family: "PartyTest";
    src: url("PartyParrot.ttf");
}
body { background: #1a1a2e; color: white; font-family: monospace; padding: 40px; }
.parrot { font-family: "PartyTest"; font-size: 48px; line-height: 1.2; }
.parrot-big { font-family: "PartyTest"; font-size: 120px; line-height: 1.2; }
.label { font-size: 14px; color: #888; margin-top: 20px; }
</style>
</head>
<body>
<h2>PartyParrot COLR Font Test</h2>
<div class="label">48px - all 10 frames:</div>
<div class="parrot">оҖҖ оҖҒ оҖӮ оҖғ оҖ„ оҖ… оҖҶ оҖҮ оҖҲ оҖү</div>
<div class="label">120px - single frame:</div>
<div class="parrot-big">оҖҖ</div>
<div class="label">120px - all frames:</div>
<div class="parrot-big">оҖҖоҖҒоҖӮоҖғоҖ„оҖ…оҖҶоҖҮоҖҲоҖү</div>
</body>
</html>
